<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Khan Steel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="overflow-x-hidden bg-industrial-black text-white min-h-screen font-sans">
    <!-- Navbar -->
    <nav class="w-full z-50 glass py-4 px-6 md:px-12 flex justify-between items-center border-b border-white border-opacity-5">
        <a href="index.html" class="text-2xl md:text-3xl font-display font-bold tracking-tighter flex items-center gap-2 text-white">
            Khan Steel <span class="bg-yellow-500 text-black text-[10px] px-2 py-1 rounded-full uppercase tracking-widest ml-2">Admin</span>
        </a>
        <button id="logout-btn" class="hidden text-xs font-bold uppercase tracking-widest text-red-400 hover:text-red-300">Logout <i class="fas fa-sign-out-alt ml-1"></i></button>
    </nav>

    <!-- Login Section -->
    <div id="login-section" class="flex flex-col items-center justify-center pt-32 px-6">
        <div class="card-dark w-full max-w-md p-8 rounded-2xl border border-white border-opacity-10 bg-industrial-charcoal/80 backdrop-blur-md shadow-2xl">
            <h2 class="text-3xl font-display font-bold text-white mb-6 uppercase tracking-tighter text-center">Secure Login</h2>
            <p class="text-xs text-gray-500 uppercase tracking-widest text-center mb-8">System Access</p>
            
            <form id="admin-login-form" class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Username</label>
                    <input type="text" id="username" class="input-dark w-full text-white px-4 py-3 bg-black/50 border border-white/10 rounded-lg focus:border-yellow-500 focus:outline-none transition-colors" placeholder="Enter username" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Password</label>
                    <input type="password" id="password" class="input-dark w-full text-white px-4 py-3 bg-black/50 border border-white/10 rounded-lg focus:border-yellow-500 focus:outline-none transition-colors" placeholder="Enter password" required>
                </div>
                <div id="login-error" class="hidden text-red-500 text-xs font-bold uppercase tracking-widest text-center">Invalid credentials. Try again.</div>
                <button type="submit" class="btn-premium group w-full py-4 text-sm mt-4 cursor-pointer relative overflow-hidden bg-white/5 border border-white/10 text-white rounded-lg hover:bg-white/10 transition-all block text-center min-h-[50px]">
                    <span class="font-bold tracking-widest uppercase relative z-10 block w-full text-center">Access Dashboard</span>
                </button>
            </form>
        </div>
        <!-- Prototype hint -->
        <p class="text-gray-600 mt-8 text-xs font-mono">Use: admin / khan123 for prototype access</p>
    </div>

    <!-- Admin Dashboard Section -->
    <div id="dashboard-section" class="hidden pt-12 px-6 md:px-12 pb-24 max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-12 border-b border-white border-opacity-10 pb-6">
            <div>
                <h1 class="text-4xl font-display font-bold uppercase tracking-tighter mb-2">Project Manager</h1>
                <p class="text-gray-400 text-sm tracking-widest uppercase">Add or remove projects from the portfolio.</p>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-12">
            <!-- Form to Add Project -->
            <div class="lg:col-span-1">
                <div class="card-dark p-6 rounded-2xl border border-white border-opacity-10 bg-industrial-charcoal/50 sticky top-24">
                    <h3 class="text-xl font-bold mb-6 uppercase tracking-widest border-b border-white/10 pb-4">Add Project</h3>
                    <form id="add-project-form" class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Project Title</label>
                            <input type="text" id="p-title" class="input-dark w-full text-white px-4 py-3 bg-black/50 border border-white/10 rounded-lg text-sm" placeholder="e.g. Spiral Staircase" required>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Meta (Location & Year)</label>
                            <input type="text" id="p-meta" class="input-dark w-full text-white px-4 py-3 bg-black/50 border border-white/10 rounded-lg text-sm" placeholder="e.g. Sarnath • 2024" required>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Image URL</label>
                            <input type="text" id="p-image" class="input-dark w-full text-white px-4 py-3 bg-black/50 border border-white/10 rounded-lg text-sm" placeholder="./as/new_project.webp" value="https://images.unsplash.com/photo-1549643276-fbc2d8ce1191?auto=format&fit=crop&q=80&w=800" required>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Description</label>
                            <textarea id="p-desc" class="input-dark w-full text-white px-4 py-3 bg-black/50 border border-white/10 rounded-lg text-sm h-24 resize-none" placeholder="Project description..." required></textarea>
                        </div>
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold tracking-widest uppercase text-xs py-3 rounded-lg transition-colors mt-4">
                            + Add Project
                        </button>
                    </form>
                </div>
            </div>

            <!-- List of Projects -->
            <div class="lg:col-span-2">
                <h3 class="text-xl font-bold mb-6 uppercase tracking-widest">Active Projects</h3>
                <div id="admin-projects-list" class="space-y-4">
                    <!-- Projects injected here via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { getProjects, addProject, removeProject } from './projectsData.js';

        // Login Logic
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('admin-login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const errorMsg = document.getElementById('login-error');

        // Check if already authenticated via sessionStorage
        if (sessionStorage.getItem('khan_admin_auth') === 'true') {
            showDashboard();
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (u === 'admin' && p === 'khan123') {
                sessionStorage.setItem('khan_admin_auth', 'true');
                showDashboard();
            } else {
                errorMsg.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('khan_admin_auth');
            dashboardSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
            logoutBtn.classList.add('hidden');
            loginForm.reset();
        });

        function showDashboard() {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            renderAdminProjects();
        }

        // Dashboard Logic
        const projectsList = document.getElementById('admin-projects-list');
        const addProjectForm = document.getElementById('add-project-form');

        async function renderAdminProjects() {
            const projects = await getProjects();
            projectsList.innerHTML = '';
            
            if (!projects || projects.length === 0) {
                projectsList.innerHTML = '<p class="text-gray-500 italic">No projects found. Add one on the left.</p>';
            }

            projects.forEach(p => {
                const el = document.createElement('div');
                el.className = 'flex flex-col md:flex-row items-center gap-6 bg-industrial-charcoal/50 border border-white/10 rounded-xl p-4';
                el.innerHTML = `
                    <div class="w-full md:w-32 h-24 rounded-lg overflow-hidden shrink-0">
                        <img src="${p.image}" class="w-full h-full object-cover" alt="Image">
                    </div>
                    <div class="flex-grow">
                        <h4 class="text-lg font-bold uppercase">${p.title}</h4>
                        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">${p.meta}</p>
                        <p class="text-sm text-gray-400 line-clamp-2">${p.description}</p>
                    </div>
                    <div class="shrink-0 flex gap-2">
                        <button class="remove-btn bg-red-900/50 hover:bg-red-600 text-red-200 hover:text-white px-4 py-2 rounded-lg transition-colors font-bold tracking-widest uppercase text-xs border border-red-500/30" data-id="${p.id}">
                            <i class="fas fa-trash-alt mr-2"></i> Remove
                        </button>
                    </div>
                `;
                projectsList.appendChild(el);
            });

            // Bind Remove Buttons
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    if(confirm('Are you sure you want to remove this project?')) {
                        await removeProject(id);
                        await renderAdminProjects();
                    }
                });
            });
        }

        // Add Project
        addProjectForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newProject = {
                id: 'p' + Date.now(),
                title: document.getElementById('p-title').value,
                meta: document.getElementById('p-meta').value,
                image: document.getElementById('p-image').value,
                description: document.getElementById('p-desc').value,
                delay: 0
            };
            await addProject(newProject);
            await renderAdminProjects();
            addProjectForm.reset();
            // Put default image URL back for ease of testing
            document.getElementById('p-image').value = "https://images.unsplash.com/photo-1549643276-fbc2d8ce1191?auto=format&fit=crop&q=80&w=800";
        });
    </script>
</body>
</html>
